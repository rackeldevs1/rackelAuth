name: Build and Release

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Required to create/update releases
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Build with Gradle
        run: ./gradlew build

      - name: Release as latest-velocity
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest-velocity
          name: Latest Velocity Build
          body: "Automatically updated build for the latest Velocity environment."
          files: build/libs/*.jar
          make_latest: true
          # This forces the action to overwrite the previous 'latest-velocity' release
          draft: false
